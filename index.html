<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Embedded Games lijst</title>
<style>
  /* Basis styling zoals eerder */
  :root {
    --primary: #e74c3c;
    --bg: #121212;
    --text: #eee;
  }
  * {
    box-sizing: border-box;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  header {
    background: #1a1a1a;
    padding: 15px;
    text-align: center;
  }
  header h1 {
    margin: 0;
  }
  nav {
    display: flex;
    justify-content: center;
    background: #222;
  }
  nav button {
    padding: 10px 20px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
    margin: 5px;
    border-radius: 4px;
  }
  nav button:hover, .active {
    background: var(--primary);
  }
  main {
    padding: 20px;
  }
  .game-section {
    display: none;
  }
  .game-section.active {
    display: block;
  }
  .game-container {
    max-width: 1000px;
    margin: 0 auto;
  }
  h2 {
    text-align: center;
    margin-bottom: 10px;
    color: var(--primary);
  }
  iframe {
    width: 100%;
    height: 600px;
    border: none;
  }
  @media(max-width: 1024px){
    iframe {
      height: 400px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Embedded Games</h1>
</header>

<nav>
  <button class="active" onclick="showGame('ping')">Ping Pong</button>
  <button onclick="showGame('racing')">Racing</button>
  <button onclick="showGame('town')">Chilling Town</button>
  <button onclick="showGame('ship')">Ship</button>
  <button onclick="showGame('penalty')">Penalty Challenge</button>
</nav>

<main>
  <!-- Ping Pong -->
  <section id="ping" class="game-section active">
    <div class="game-container">
      <h2>Ping Pong</h2>
      <!-- Vervang de src door de echte embed-URL van de game -->
      <iframe src="https://www.crazygames.com/game/ping-pong" allowfullscreen></iframe>
    </div>
  </section>
  
  <!-- Racing -->
  <section id="racing" class="game-section">
    <div class="game-container">
      <h2>Racing</h2>
      <iframe src="https://www.crazygames.com/game/racing-game" allowfullscreen></iframe>
    </div>
  </section>
  
  <!-- Chilling Town -->
  <section id="town" class="game-section">
    <div class="game-container">
      <h2>Chilling Town</h2>
      <iframe src="https://www.spel.nl/game/chilling-town" allowfullscreen></iframe>
    </div>
  </section>
  
  <!-- Ship -->
  <section id="ship" class="game-section">
    <div class="game-container">
      <h2>Ship</h2>
      <iframe src="https://www.crazygames.com/game/ship-game" allowfullscreen></iframe>
    </div>
  </section>
  
  <!-- Penalty Challenge Multiplayer -->
  <section id="penalty" class="game-section">
    <div class="game-container">
      <h2>Penalty Challenge Multiplayer</h2>
      <iframe src="https://spele.nl/penalty-challenge-multiplayer-spel/" allowfullscreen></iframe>
    </div>
  </section>
</main>

<script>
  function showGame(id) {
    document.querySelectorAll('.game-section').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelector(`button[onclick="showGame('${id}')"]`).classList.add('active');
  }
</script>

</body>
</html>
